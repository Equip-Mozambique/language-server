<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Language Server — Equip Mozambique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet" />
  <script>
    // The preview serve endpoint requires a `t=` token query param on every request.
    // The host attaches it to the top-level navigation but not to sub-resources.
    // Re-attach it to all our same-origin links/scripts.
    (function () {
      var t = new URLSearchParams(location.search).get("t");
      if (!t) return;
      window.__tok = "?t=" + t;
    })();
    // Benign ResizeObserver loop warning fires under Babel + dynamic content; suppress.
    window.addEventListener("error", function (e) {
      if (e && e.message && e.message.indexOf("ResizeObserver") !== -1) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    });
  </script>
  <script>
    // Inject stylesheet with token
    (function () {
      var tok = window.__tok || "";
      var l = document.createElement("link");
      l.rel = "stylesheet"; l.href = "styles.css" + tok;
      document.head.appendChild(l);
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    // Fetch our app sources (with the host's `t=` token attached), transform JSX via
    // Babel.standalone, and execute in order — bypassing the host's missing token
    // propagation on dynamic script src loads.
    (async function () {
      var tok = window.__tok || "";
      var sources = [
        { src: "data.js",            jsx: false },
        { src: "icons.jsx",          jsx: true  },
        { src: "components.jsx",     jsx: true  },
        { src: "shell.jsx",          jsx: true  },
        { src: "pages-1.jsx",        jsx: true  },
        { src: "pages-2.jsx",        jsx: true  },
        { src: "page-inventory.jsx", jsx: true  },
        { src: "tweaks-panel.jsx",   jsx: true  },
        { src: "app.jsx",            jsx: true  },
      ];
      for (var i = 0; i < sources.length; i++) {
        var s = sources[i];
        try {
          var res = await fetch(s.src + tok);
          if (!res.ok) throw new Error("HTTP " + res.status + " for " + s.src);
          var code = await res.text();
          if (s.jsx) {
            code = Babel.transform(code, { presets: ["env", "react"] }).code;
          }
          // Execute via a script tag so errors land with a useful source name
          var el = document.createElement("script");
          el.textContent = code + "\n//# sourceURL=" + s.src;
          document.body.appendChild(el);
        } catch (e) {
          console.error("Failed to load/run " + s.src + ":", e);
        }
      }
    })();
  </script>
</body>
</html>
